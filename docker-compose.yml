services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      PYTHONUNBUFFERED: "1"
      ALEXANDRIA_OPERATOR_API_KEY: ${ALEXANDRIA_OPERATOR_API_KEY}
      SERVICE_RAG_VECTOR_ENABLED: ${SERVICE_RAG_VECTOR_ENABLED:-true}
      SERVICE_RAG_EMBEDDING_PROVIDER: ${SERVICE_RAG_EMBEDDING_PROVIDER:-fastembed}
      SERVICE_RAG_EMBEDDING_MODEL: ${SERVICE_RAG_EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
      SERVICE_RAG_EMBEDDING_DIMENSIONS: ${SERVICE_RAG_EMBEDDING_DIMENSIONS:-384}
      SERVICE_RAG_EMBEDDING_CACHE_DIR: ${SERVICE_RAG_EMBEDDING_CACHE_DIR:-/app/data/fastembed-cache}
      SERVICE_OBSIDIAN_VAULT_PATH: ${SERVICE_OBSIDIAN_VAULT_PATH:-${ALEXANDRIA_HOST_OBSIDIAN_VAULT_PATH:-${HOME}/Desktop/Alexandria}}
      SERVICE_ALEXANDRIA_OBSIDIAN_ROOT: ${SERVICE_ALEXANDRIA_OBSIDIAN_ROOT:-.}
      SERVICE_MEMORY_COMPACT_NOTE_DIR: ${SERVICE_MEMORY_COMPACT_NOTE_DIR:-Memory Compacts}
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      - ./backend/uv.lock:/app/uv.lock:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/app:/app/app:ro
      - ./backend/migrations:/app/migrations:ro
      - ./backend/tests:/app/tests:ro
      - ./backend/data:/app/data
      - ${ALEXANDRIA_HOST_OBSIDIAN_VAULT_PATH:-${HOME}/Desktop/Alexandria}:${SERVICE_OBSIDIAN_VAULT_PATH:-${ALEXANDRIA_HOST_OBSIDIAN_VAULT_PATH:-${HOME}/Desktop/Alexandria}}
    restart: unless-stopped
