services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: >
      sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    environment:
      PYTHONUNBUFFERED: "1"
      SERVICE_OPERATOR_API_KEY: ${SERVICE_OPERATOR_API_KEY}
      SERVICE_CODEX_OAUTH_ISSUER: ${SERVICE_CODEX_OAUTH_ISSUER}
      SERVICE_CODEX_OAUTH_CLIENT_ID: ${SERVICE_CODEX_OAUTH_CLIENT_ID}
      SERVICE_CODEX_OAUTH_DEVICE_EXPIRES_IN_SECONDS: ${SERVICE_CODEX_OAUTH_DEVICE_EXPIRES_IN_SECONDS}
      SERVICE_CODEX_OAUTH_MIN_POLL_INTERVAL_SECONDS: ${SERVICE_CODEX_OAUTH_MIN_POLL_INTERVAL_SECONDS}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/pyproject.toml:/app/pyproject.toml:ro
      - ./backend/uv.lock:/app/uv.lock:ro
      - ./backend/alembic.ini:/app/alembic.ini:ro
      - ./backend/app:/app/app:ro
      - ./backend/migrations:/app/migrations:ro
      - ./backend/tests:/app/tests:ro
      - ./backend/data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: npm run dev
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://backend:8000
      ALEXANDRIA_OPERATOR_API_KEY: ${SERVICE_OPERATOR_API_KEY}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
