name: Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: Backend quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Sync backend dependencies
        working-directory: backend
        run: uv sync --group dev --reinstall-package alexandria-hermes

      - name: Run backend CI
        working-directory: backend
        shell: bash
        run: |
          set -o pipefail
          make ci 2>&1 | tee backend-ci.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail -n 120 backend-ci.log > backend-ci-tail.log
            {
              echo "Backend CI failed. Last 120 log lines:"
              sed 's/%/%25/g; s/\r/%0D/g; s/\n/%0A/g' backend-ci-tail.log
            } | awk 'BEGIN { printf "::error title=Backend CI failure::" } { printf "%s%%0A", $0 } END { printf "\n" }'
            exit "$status"
          fi
